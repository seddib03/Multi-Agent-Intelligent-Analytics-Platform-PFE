services:

  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dxc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dxcpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dxc_insight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dxc} -d ${POSTGRES_DB:-dxc_insight}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nexora_net

  # ─── MinIO ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexora_net

  # ─── MinIO Init ────────────────────────────────────────
  # Crée le bucket dxc-datasets au démarrage, puis s'arrête
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-dxc-datasets}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        mc anonymous set none local/$${MINIO_BUCKET};
        echo 'Bucket $${MINIO_BUCKET} ready';
        exit 0;
      "
    networks:
      - nexora_net

  # ─── API ───────────────────────────────────────────────
  # docker-compose.yml — ajouter ce service
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: nexora_keycloak
    restart: unless-stopped
    command: start-dev          # mode dev — utiliser start en prod
    environment:
      KEYCLOAK_ADMIN:          ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dxc_insight}
      KC_DB_USERNAME:          ${POSTGRES_USER:-dxc}
      KC_DB_PASSWORD:          ${POSTGRES_PASSWORD:-dxcpassword}
      KC_HOSTNAME_STRICT:      false
      KC_HTTP_ENABLED:         true
    ports:
      - "8080:8080"             # Console admin Keycloak
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexora_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 30s
      timeout: 10s
      retries: 10
      
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dxc}:${POSTGRES_PASSWORD:-dxcpassword}@postgres:5432/${POSTGRES_DB:-dxc_insight}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-dxc-datasets}
      MINIO_SECURE: "false"
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-dxc}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-dxc_frontend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-0TEEu2mA9sOIY3YHZhMIMBfseUImh3WY}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-dxc_backend}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-sbZ2ol7kpC6uUrZbmmO1zTn1C8TcrIzB}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production-32chars-min}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app   
      - ./backend/feature3:/app/feature3
      - ./backend/alembic:/app/alembic
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - nexora_net

  # ─── DXC Insight Hub Frontend ─────────────────────────
  dxc-insight-hub:
    build:
      context: ./dxc-insight-hub
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    networks:
      - nexora_net

volumes:
  postgres_data:
  minio_data:

networks:
  nexora_net:
    driver: bridge