  - id: TRP-001
    sector: transport
    intent: aggregation
    language: fr
    question: "Quel est le retard moyen sur l'ensemble des vols ce mois ?"
    expected:
      kpi: "Average Delay"
      contains: ["retard", "moyen", "minutes"]
      sql_hint: "AVG"
      chart: ["kpi_card", "bar_chart"]
    tags: [kpi, delay, monthly]

  - id: TRP-002
    sector: transport
    intent: aggregation
    language: en
    question: "What is the on-time performance rate for this quarter?"
