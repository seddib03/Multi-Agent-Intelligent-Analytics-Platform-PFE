# ══════════════════════════════════════════════════════════════════════════════
# BASE DE TEST — 100 Use Cases
# PFE DXC Technology — Intelligence Analytics Platform
# Remarque encadrant R3 : base de test pour évaluation LLM-as-judge
#
# Structure :
#   sector    : secteur concerné
#   id        : identifiant unique (SECTOR-XXX)
#   intent    : intent attendu (ground truth)
#   question  : question posée en langage naturel
#   language  : langue de la question (fr | ar | en)
#   expected  : éléments attendus dans la réponse (pour le juge LLM)
#   tags      : catégories pour filtrage
# ══════════════════════════════════════════════════════════════════════════════

use_cases:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
