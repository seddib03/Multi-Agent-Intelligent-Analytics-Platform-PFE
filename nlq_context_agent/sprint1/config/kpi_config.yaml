sectors:
  transport:
    dashboard_focus: "Passenger Experience & Flight Operations"
    kpis:
      - name: "On-Time Performance"
        description: "Percentage of flights arriving within 15 minutes of schedule"
        unit: "%"
      - name: "Average Delay"
        description: "Mean delay across all flights in minutes"
        unit: "minutes"
      - name: "Passenger Satisfaction Score"
        description: "Average satisfaction rating from passenger surveys"
        unit: "score/5"
      - name: "Load Factor"
        description: "Percentage of available seats filled by passengers"
        unit: "%"
      - name: "Cancellation Rate"
        description: "Percentage of scheduled flights cancelled"
        unit: "%"

  finance:
    dashboard_focus: "Financial Performance & Risk Management"
    kpis:
      - name: "Revenue Growth"
        description: "Year-over-year revenue growth rate"
        unit: "%"
      - name: "Net Profit Margin"
        description: "Net profit as a percentage of total revenue"
        unit: "%"
      - name: "Default Rate"
        description: "Percentage of loans or credit in default"
        unit: "%"
      - name: "Return on Equity"
        description: "Net income divided by shareholder equity"
        unit: "%"
      - name: "Cost-to-Income Ratio"
        description: "Operating costs as a percentage of operating income"
        unit: "%"

  retail:
    dashboard_focus: "Sales Performance & Customer Engagement"
    kpis:
      - name: "Revenue per Store"
        description: "Average revenue generated per store location"
        unit: "MAD"
      - name: "Stock Turnover Rate"
        description: "Number of times inventory is sold and replaced per period"
        unit: "times/year"
      - name: "Customer Satisfaction"
        description: "Average customer satisfaction score"
        unit: "score/10"
      - name: "Cart Abandonment Rate"
        description: "Percentage of online carts not converted to purchases"
        unit: "%"
      - name: "Stockout Rate"
        description: "Percentage of time products are out of stock"
        unit: "%"

  manufacturing:
    dashboard_focus: "Production Efficiency & Quality Control"
    kpis:
      - name: "OEE"
        description: "Overall Equipment Effectiveness — availability x performance x quality"
        unit: "%"
      - name: "Defect Rate"
        description: "Percentage of defective units in total production"
        unit: "%"
      - name: "Production Throughput"
        description: "Number of units produced per hour"
        unit: "units/hour"
      - name: "Downtime Rate"
        description: "Percentage of scheduled production time lost to downtime"
        unit: "%"
      - name: "First Pass Yield"
        description: "Percentage of units passing quality check on first attempt"
        unit: "%"

  public:
    dashboard_focus: "Public Services & Budget Performance"
    kpis:
      - name: "Budget Execution Rate"
        description: "Percentage of allocated budget actually spent"
        unit: "%"
      - name: "Service Response Time"
        description: "Average time to respond to citizen requests"
        unit: "days"
      - name: "Citizen Satisfaction"
        description: "Average satisfaction score from citizen surveys"
        unit: "score/10"
      - name: "Infrastructure Utilization"
        description: "Percentage of public infrastructure capacity in use"
        unit: "%"
      - name: "Digital Adoption Rate"
        description: "Percentage of services accessed via digital channels"
        unit: "%"
